  </header>

  <!-- Filter & Sort Controls -->

    <div class="filter-buttons" id="filterButtons" role="group" aria-label="Filter by category">
      <button class="filter-btn active" data-filter="all" aria-pressed="true">All</button>
      <!-- Category buttons inserted here by JS -->
    </div>
  </div>

  <!-- Menu Grid -->
  <div class="container">
    <div class="menu-grid" id="menuContainer">
      <p style="color: var(--text-muted); grid-column: 1/-1; text-align: center;">Loading menu items...</p>
    </div>
  </div>

  <!-- Cart Panel -->
  <div class="cart-panel" id="cartPanel" style="display: none;">
    <div class="cart-header">
      <h3>SHOPPING CART</h3>
      <button onclick="closeCart()" style="background:none;border:none;color:white;font-size:1.5rem;cursor:pointer;">&times;</button>
    </div>
    <div id="cartContainer">
      <p style="color: var(--text-muted); text-align: center; padding: 2rem;">Your cart is empty</p>
    </div>
  </div>

  <div id="toastContainer"></div>

  <footer>
    <div class="copyright">&copy; 2024 5G Network Eatery. All systems operational.</div>
  </footer>

  <script src="menu.js"></script>
  <script>
    // PWA Install Logic
    let deferredPrompt;
    const desktopInstallBtn = document.getElementById('installAppBtn');
    const mobileInstallBtn = document.getElementById('mobileInstallBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      if (desktopInstallBtn) {
        desktopInstallBtn.style.display = 'block';
      }
      if (mobileInstallBtn) {
        mobileInstallBtn.style.display = 'flex';
      }
    });

    const installHandler = async (btn) => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        console.log(`User response to the install prompt: ${outcome}`);
        deferredPrompt = null;
        if (desktopInstallBtn) desktopInstallBtn.style.display = 'none';
        if (mobileInstallBtn) mobileInstallBtn.style.display = 'none';
      }
    };

    if (desktopInstallBtn) {
      desktopInstallBtn.addEventListener('click', () => installHandler(desktopInstallBtn));
    }
    if (mobileInstallBtn) {
      mobileInstallBtn.addEventListener('click', () => installHandler(mobileInstallBtn));
    }

    window.addEventListener('appinstalled', () => {
      if(desktopInstallBtn) { desktopInstallBtn.style.display = 'none'; }
      if(mobileInstallBtn) { mobileInstallBtn.style.display = 'none'; }
      deferredPrompt = null;
      console.log('PWA was installed');
    });

    // Sync cart counts between desktop and mobile
    function updateCartCount(count) {
      const desktopCount = document.getElementById('cartCount');
      const mobileCount = document.getElementById('mobileCartCount');
      if (desktopCount) desktopCount.textContent = count;
      if (mobileCount) mobileCount.textContent = count;
    }

    // Override the cart update function in menu.js
    window.updateCartCount = updateCartCount;
  </script>
</body>
</html>
