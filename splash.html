<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>5G NETWORK EATERY · LOADING</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #E10600;
      --red-dim: rgba(225, 6, 0, 0.15);
      --red-glow: rgba(225, 6, 0, 0.6);
      --bg: #080809;
      --surface: rgba(18, 18, 20, 0.9);
      --muted: #666670;
      --light: #c8c8d0;
      --radius: 28px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* ── Ambient background ── */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    .bg-orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(225,6,0,0.18) 0%, transparent 70%);
      top: -100px; left: -100px;
      animation: orbDrift1 12s ease-in-out infinite alternate;
    }
    .bg-orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(225,6,0,0.12) 0%, transparent 70%);
      bottom: -80px; right: -80px;
      animation: orbDrift2 15s ease-in-out infinite alternate;
    }
    @keyframes orbDrift1 {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(60px, 80px) scale(1.2); }
    }
    @keyframes orbDrift2 {
      from { transform: translate(0, 0) scale(1.1); }
      to   { transform: translate(-50px, -60px) scale(0.9); }
    }

    /* ── Noise grain overlay ── */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
      z-index: 1;
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 10;
      width: 340px;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius);
      padding: 36px 32px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow:
        0 0 0 1px rgba(225,6,0,0.08),
        0 8px 32px rgba(0,0,0,0.6),
        0 0 80px rgba(225,6,0,0.1),
        inset 0 1px 0 rgba(255,255,255,0.06);
      animation: cardIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Top badge ── */
    .badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(225,6,0,0.12);
      border: 1px solid rgba(225,6,0,0.25);
      border-radius: 100px;
      padding: 5px 12px 5px 8px;
      margin-bottom: 28px;
      animation: cardIn 0.7s 0.1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .badge-dot {
      width: 7px; height: 7px;
      background: var(--red);
      border-radius: 50%;
      animation: blink 1.4s ease infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 1; box-shadow: 0 0 6px var(--red); }
      50%      { opacity: 0.35; box-shadow: none; }
    }
    .badge span {
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.8px;
      color: var(--red);
      text-transform: uppercase;
    }

    /* ── Ring progress ── */
    .ring-wrap {
      position: relative;
      width: 160px;
      height: 160px;
      margin-bottom: 28px;
      animation: cardIn 0.7s 0.15s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .ring-svg {
      width: 160px; height: 160px;
      transform: rotate(-90deg);
    }
    .ring-track {
      fill: none;
      stroke: rgba(255,255,255,0.05);
      stroke-width: 5;
    }
    .ring-fill {
      fill: none;
      stroke: var(--red);
      stroke-width: 5;
      stroke-linecap: round;
      stroke-dasharray: 440;
      stroke-dashoffset: 440;
      filter: drop-shadow(0 0 8px var(--red-glow));
      transition: stroke-dashoffset 0.15s linear;
    }
    /* Pulse ring */
    .ring-pulse {
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      border: 1.5px solid rgba(225,6,0,0.3);
      animation: ringPulse 2.4s ease-out infinite;
    }
    .ring-pulse-2 {
      inset: -24px;
      animation-delay: 0.8s;
    }
    @keyframes ringPulse {
      0%   { opacity: 0.6; transform: scale(0.9); }
      100% { opacity: 0;   transform: scale(1.15); }
    }
    /* Ring center */
    .ring-inner {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }
    .ring-percent {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px;
      line-height: 1;
      color: #fff;
      letter-spacing: 1px;
      text-shadow: 0 0 20px rgba(255,255,255,0.2);
    }
    .ring-label {
      font-size: 10px;
      letter-spacing: 2.5px;
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 500;
    }

    /* ── Brand ── */
    .brand {
      text-align: center;
      margin-bottom: 24px;
      animation: cardIn 0.7s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .brand-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 38px;
      letter-spacing: 6px;
      color: #fff;
      line-height: 1;
      margin-bottom: 6px;
    }
    .brand-title span { color: var(--red); }
    .brand-sub {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 500;
    }

    /* ── Signal bars ── */
    .signal {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 22px;
      margin-bottom: 20px;
      animation: cardIn 0.7s 0.25s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .signal-bar {
      width: 5px;
      border-radius: 3px;
      background: linear-gradient(to top, rgba(225,6,0,0.5), var(--red));
      animation: barPulse 1.1s ease-in-out infinite;
    }
    .signal-bar:nth-child(1) { height: 8px;  animation-delay: 0s; }
    .signal-bar:nth-child(2) { height: 12px; animation-delay: 0.1s; }
    .signal-bar:nth-child(3) { height: 16px; animation-delay: 0.2s; }
    .signal-bar:nth-child(4) { height: 20px; animation-delay: 0.3s; }
    .signal-bar:nth-child(5) { height: 22px; animation-delay: 0.4s; }
    @keyframes barPulse {
      0%,100% { opacity: 0.45; transform: scaleY(0.7); }
      50%      { opacity: 1;    transform: scaleY(1); }
    }

    /* ── Status message ── */
    .status-wrap {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: cardIn 0.7s 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .status-icon {
      width: 28px; height: 28px;
      flex-shrink: 0;
      background: var(--red-dim);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .status-icon svg {
      width: 14px; height: 14px;
      fill: var(--red);
    }
    .status-msg {
      font-size: 12.5px;
      color: var(--light);
      font-weight: 400;
      line-height: 1.4;
      flex: 1;
      transition: opacity 0.3s ease;
    }

    /* ── Progress bar (bottom) ── */
    .bar-wrap {
      width: 100%;
      margin-top: 18px;
      animation: cardIn 0.7s 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .bar-track {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.06);
      border-radius: 100px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #8B0000, var(--red));
      border-radius: 100px;
      box-shadow: 0 0 10px var(--red-glow);
      transition: width 0.15s linear;
    }
    .bar-meta {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
    }
    .bar-step {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 500;
    }
    .bar-eta {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 500;
    }

    /* ── Fade out ── */
    .fade-out {
      animation: fadeOut 0.9s cubic-bezier(0.4, 0, 1, 1) forwards;
    }
    @keyframes fadeOut {
      0%   { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.04); }
    }

    /* ── Responsive ── */
    @media (max-width: 400px) {
      .card { width: 300px; padding: 28px 22px 26px; }
      .brand-title { font-size: 32px; }
      .ring-wrap { width: 140px; height: 140px; }
      .ring-svg { width: 140px; height: 140px; }
      .ring-percent { font-size: 36px; }
    }
  </style>
</head>
<body>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>

  <div class="card" id="loader">

    <!-- Live badge -->
    <div class="badge">
      <div class="badge-dot"></div>
      <span>5G Network Active</span>
    </div>

    <!-- Ring progress -->
    <div class="ring-wrap">
      <div class="ring-pulse"></div>
      <div class="ring-pulse ring-pulse-2"></div>
      <svg class="ring-svg" viewBox="0 0 160 160">
        <circle class="ring-track" cx="80" cy="80" r="70"/>
        <circle class="ring-fill" id="ring" cx="80" cy="80" r="70"/>
      </svg>
      <div class="ring-inner">
        <div class="ring-percent" id="percent">0%</div>
        <div class="ring-label">Loading</div>
      </div>
    </div>

    <!-- Brand -->
    <div class="brand">
      <div class="brand-title">5G <span>EATERY</span></div>
      <div class="brand-sub">High-Speed Dining Experience</div>
    </div>

    <!-- Signal -->
    <div class="signal">
      <div class="signal-bar"></div>
      <div class="signal-bar"></div>
      <div class="signal-bar"></div>
      <div class="signal-bar"></div>
      <div class="signal-bar"></div>
    </div>

    <!-- Status message -->
    <div class="status-wrap">
      <div class="status-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/>
        </svg>
      </div>
      <div class="status-msg" id="loader-message">Connecting to 5G network...</div>
    </div>

    <!-- Linear bar -->
    <div class="bar-wrap">
      <div class="bar-track">
        <div class="bar-fill" id="bar"></div>
      </div>
      <div class="bar-meta">
        <span class="bar-step" id="step">INITIALIZING</span>
        <span class="bar-eta" id="eta">ETA —</span>
      </div>
    </div>

  </div>

  <script>
    const ring = document.getElementById('ring');
    const percentEl = document.getElementById('percent');
    const bar = document.getElementById('bar');
    const msgEl = document.getElementById('loader-message');
    const stepEl = document.getElementById('step');
    const etaEl = document.getElementById('eta');
    const loader = document.getElementById('loader');

    const R = 70;
    const CIRC = 2 * Math.PI * R;
    ring.style.strokeDasharray = CIRC;
    ring.style.strokeDashoffset = CIRC;

    const steps = [
      { pct: 0,   msg: "Connecting to 5G network...",      step: "INITIALIZING" },
      { pct: 12,  msg: "Loading fresh ingredients...",      step: "SOURCING" },
      { pct: 24,  msg: "Preparing your digital kitchen...", step: "SETUP" },
      { pct: 38,  msg: "Establishing secure connection...", step: "SECURING" },
      { pct: 50,  msg: "Calibrating flavor algorithms...",  step: "CALIBRATING" },
      { pct: 62,  msg: "Syncing with cloud servers...",     step: "SYNCING" },
      { pct: 74,  msg: "Optimising delivery routes...",     step: "OPTIMISING" },
      { pct: 86,  msg: "Warming up the servers...",         step: "WARMING UP" },
      { pct: 94,  msg: "Almost ready — final checks...",    step: "VERIFYING" },
      { pct: 100, msg: "Welcome! Your table is ready.",     step: "COMPLETE" },
    ];

    let pct = 0;
    const start = Date.now();
    const DURATION = 4000; // ~4s total

    function getStep(p) {
      let s = steps[0];
      for (const t of steps) { if (p >= t.pct) s = t; }
      return s;
    }

    function render(p) {
      const offset = CIRC - (p / 100) * CIRC;
      ring.style.strokeDashoffset = offset;
      bar.style.width = p + '%';
      percentEl.textContent = Math.round(p) + '%';
      const s = getStep(p);
      msgEl.textContent = s.msg;
      stepEl.textContent = s.step;
      const remaining = Math.max(0, DURATION - (Date.now() - start));
      etaEl.textContent = p >= 100 ? 'DONE' : `ETA ${(remaining / 1000).toFixed(1)}s`;
    }

    const iv = setInterval(() => {
      pct += (Math.random() * 3.5 + 1.5);
      if (pct >= 100) {
        pct = 100;
        clearInterval(iv);
        render(100);
        setTimeout(() => loader.classList.add('fade-out'), 600);
        setTimeout(() => {
          const urlParams = new URLSearchParams(window.location.search);
          const target = urlParams.get('target') || 'index.html';
          sessionStorage.setItem('splashShown', 'true');
          window.location.href = target;
        }, 1400);
        return;
      }
      render(pct);
    }, 80);

    render(0);
  </script>
</body>
</html>
